<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>CRM Ciptech</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #e9ecef;
    }

    .campo {
      margin-top: 14px;
    }

    select {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #3b3b3b;
      font-size: 15px;
      background: white;
    }

    .campo {
      margin-top: 14px;
    }

    #bloqueCotizacion {
      margin-bottom: 18px;
    }

    #bloqueGestionCot select {
      margin-bottom: 18px;
    }

    #estadoPostCot {
      margin-top: 18px;
    }

    #listaCotizaciones {
      margin-bottom: 18px;
    }

    /* APP CONTAINER */

    .app {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* CARD */

    .card {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      padding: 28px 22px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
      text-align: center;
      position: relative;
    }

    /* TITULOS */

    .t1 {
      color: #7ED957;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .t2 {
      color: #123E7A;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 22px;
    }

    /* INPUT */

    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 2px solid #444;
      font-size: 17px;
      margin-bottom: 18px;
      outline: none;
    }

    /* BUTTON */

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: #1f4a83;
      color: white;
      font-size: 17px;
      cursor: pointer;
      transition: .2s;
    }

    button:active {
      transform: scale(.97);
    }

    #zonaGestion button {
      margin-top: 22px;
    }

    .btn-mini {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #1f4e8c;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;
      display: none;
      line-height: 1.2;
    }

    .btn-mini {
      width: auto !important;
      display: none;
    }

    /* LOADER */

    .loader {
      display: none;
      margin: 18px 0;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 4px solid #ddd;
      border-top: 4px solid #1f4a83;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0)
      }

      100% {
        transform: rotate(360deg)
      }
    }

    /* INFO */

    .box {
      background: #dfe6ef;
      padding: 16px;
      border-radius: 12px;
      font-weight: bold;
      color: #123E7A;
      margin-top: 18px;
      display: none;
    }

    .estado {
      margin-top: 18px;
      font-size: 17px;
    }

    .msgOk {
      background: #6fd14b;
      color: white;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
    }

    /* MOBILE FULL APP */

    @media(max-width:480px) {

      .app {
        align-items: flex-start;
        padding: 14px;
      }

      .card {
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
        padding-top: 70px;
      }

    }
  </style>

</head>

<body>

  <div class="app">

    <div class="card">

      <div class="t1">Atención Leads</div>
      <div class="t2">MKT Ciptech</div>

      <!-- BOTON NUEVA BUSQUEDA -->
      <button id="btnBuscarMini" onclick="nuevaBusqueda()" class="btn-mini">
        Buscar Lead
      </button>

      <!-- COLOCAR ID DEL LEAD -->
      <input id="idLead" placeholder="ID Lead">

      <!-- BOTON DE BUSCAR LEAD -->
      <button id="btnBuscarLead" onclick="buscar()">Buscar lead</button>

      <div class="loader" id="loader">
        <div class="spinner"></div>
      </div>

      <div id="info" class="box"></div>
      <div id="estado" class="estado"></div>

      <!-- DESPLEGABLES -->
      <div id="zonaGestion" style="display:none">

        <div class="boxInfo" id="infoLead"></div>

        <div id="bloqueAsesor" class="campo">
          <select id="asesor">
            <option value="">Seleccionar Asesor</option>
            <option>Herson Zevallos</option>
            <option>Luz Arone</option>
            <option>Daniel Bravo</option>
            <option>Brayan Martinez</option>
          </select>
        </div>

        <div id="bloqueEstadoInicial" class="campo">
          <select id="estadoInicial">
            <option value="">Seleccionar Estado</option>
            <option>ATENDIDO</option>
          </select>
        </div>

        <!-- DROPDOWN DESPUES DE ATENCIÓN -->
        <div id="bloqueEstadoAvanzado" class="campo">
          <select id="estadoAvanzado">
            <option value="">Seleccionar Estado</option>
            <option>COTIZADO</option>
            <option>PERDIDO</option>
          </select>
        </div>

        <!-- DROPDOWN DESPUES DE COTIZACIÓN -->
        <div id="bloqueGestionCot" class="campo" style="display:none">

          <select id="listaCotizaciones"></select>

        </div>

        <!-- CAMPOS PARA COTIZACIÓN -->
        <div id="bloqueCotizacion" class="campo" style="display:none">

          <select id="monedaCot">
            <option value="">Tipo Moneda</option>
            <option>PEN</option>
            <option>USD</option>
          </select>

          <input id="montoCot" placeholder="Monto de Cotización">

          <input id="numCot" placeholder="N° de Cotización">

        </div>

        <select id="estadoPostCot">
          <option value="">Seleccionar Estado</option>
          <option>CERRADO</option>
          <option>PERDIDO</option>
        </select>

        <div id="bloquePerdido" class="campo" style="display:none">
          <textarea id="motivoPerdido" placeholder="Motivo de pérdida"
            style="width:100%;padding:14px;border-radius:14px;border:2px solid #444;font-size:15px;"></textarea>
        </div>

        <div id="bloqueOV" class="campo" style="display:none">
          <select id="listaOV" style="display:none"></select>
          <select id="monedaOV">
            <option value="">Tipo Moneda</option>
            <option>PEN</option>
            <option>USD</option>
          </select>
          <input id="montoOV" placeholder="Monto de Cierre">
          <input id="numOV" placeholder="N° Orden de Venta">
        </div>



        <button class="btnGuardar" onclick="guardar()">Guardar Cambios</button>
        <div id="msgOk" class="msgOk" style="display:none">
          Se guardó con éxito
        </div>

      </div>

    </div>

  </div>

  <script>

    const URL = "https://script.google.com/macros/s/AKfycbzSc0ncg1rGKUxalwXtaQJ3qMEB0sSBd5lhLs2pUVUcocNYWbd6CkW6HHmtQ4KRQ_dvLw/exec";

    let leadActivo = null

    //FUNCIÓN BUSCAR - CONSULTA DE LEADS
    function buscar() {

      const id = document.getElementById("idLead").value.trim()

      if (!id) {
        alert("Ingrese ID")
        return
      }

      document.getElementById("loader").style.display = "block"

      fetch(URL + "?accion=consultar&id=" + id)

        .then(r => r.json())

        .then(data => {

          document.getElementById("loader").style.display = "none"

          if (!data || !data.lead) {
            alert("Lead no encontrado")
            return
          }

          window.historialLead = data.historial
          window.dataOVs = data.ovs

          leadActivo = id

          // BLOQUEAR ID
          document.getElementById("idLead").readOnly = true

          // BOTONES
          document.getElementById("btnBuscarLead").style.display = "none"
          document.getElementById("btnBuscarMini").style.display = "block"

          // INFO
          document.getElementById("info").style.display = "block"
          document.getElementById("info").innerHTML =
            "Empresa: " + data.lead.empresa +
            "<br>RUC: " + data.lead.ruc +
            "<br>Teléfono: " + data.lead.telefono

          pintarLead(data)

        })

        .catch(() => {
          document.getElementById("loader").style.display = "none"
          alert("Error conexión")
        })

    }

    //FUNCIÓN PARA MOSTRAR LOS ESTADOS DEL LEAD

    function pintarLead(data) {

      document.getElementById("estadoPostCot").style.display = "none"
      document.getElementById("bloqueGestionCot").style.display = "none"
      document.getElementById("zonaGestion").style.display = "block"

      let estado = data.estado

      if (data.historial && data.historial.some(x => x.estado === "CERRADO")) {
        estado = "CERRADO"
      } else if (data.cotizaciones && data.cotizaciones.length > 0) {
        estado = "COTIZADO"
      }

      const selEstado = document.getElementById("estadoAvanzado")
      selEstado.innerHTML = ""

      let op0 = document.createElement("option")
      op0.text = "Seleccionar Estado"
      op0.value = ""
      selEstado.add(op0)

      if (estado === "ATENDIDO") {

        let op1 = document.createElement("option")
        op1.text = "COTIZADO"
        op1.value = "COTIZADO"
        selEstado.add(op1)

        let op2 = document.createElement("option")
        op2.text = "PERDIDO"
        op2.value = "PERDIDO"
        selEstado.add(op2)

      }

      if (estado === "COTIZADO") {

        let op1 = document.createElement("option")
        op1.text = "CERRADO"
        op1.value = "CERRADO"
        selEstado.add(op1)

        let op2 = document.createElement("option")
        op2.text = "PERDIDO"
        op2.value = "PERDIDO"
        selEstado.add(op2)

      }

      document.getElementById("estado").innerHTML =
        "Estado Actual: <b>" + estado + "</b><br>" +
        "Asesor: <b>" + (data.asesor || "-") + "</b>"

      document.getElementById("bloqueAsesor").style.display = "none"
      document.getElementById("bloqueEstadoInicial").style.display = "none"
      document.getElementById("bloqueEstadoAvanzado").style.display = "none"
      document.getElementById("bloquePerdido").style.display = "none"

      // 👇 SI YA ES PERDIDO → NO mostrar nada arriba
      if (estado === "PERDIDO") {
        document.getElementById("bloqueEstadoAvanzado").style.display = "none"
      }

      if (estado == "SIN GESTIONAR") {
        document.getElementById("bloqueAsesor").style.display = "block"
        document.getElementById("bloqueEstadoInicial").style.display = "block"
      }

      document.getElementById("bloqueCotizacion").style.display = "none"

      const sel = document.getElementById("listaCotizaciones")
      sel.innerHTML = ""

      if (estado == "ATENDIDO") {

        document.getElementById("bloqueEstadoAvanzado").style.display = "block" // 👈 CLAVE

        document.getElementById("estadoPostCot").style.display = "none"
        document.getElementById("bloqueGestionCot").style.display = "none"
        document.getElementById("bloqueCotizacion").style.display = "none"

      }

      if (estado == "COTIZADO" || estado == "CERRADO") {

        document.getElementById("estadoPostCot").style.display = "block"
        document.getElementById("bloqueGestionCot").style.display = "block"

        if (estado == "COTIZADO") {
          document.getElementById("bloqueCotizacion").style.display = "none"
        }

        if (estado == "CERRADO") {
          document.getElementById("bloqueCotizacion").style.display = "none"
        }

        let op0 = document.createElement("option")
        op0.text = "N° de Cotización"
        op0.value = ""
        sel.add(op0)

        data.cotizaciones.forEach(c => {
          let op = document.createElement("option")
          op.text = c
          op.value = c
          sel.add(op)
        })

        let opNew = document.createElement("option")
        opNew.text = "Nueva Cotización"
        opNew.value = "NEW"
        sel.add(opNew)

        if (estado == "SIN GESTIONAR") {
          document.getElementById("bloqueAsesor").style.display = "block"
          document.getElementById("bloqueEstadoInicial").style.display = "block"
        }

      }

    }

    //GUARDAR CAMBIOS
    function guardar() {

      const id = leadActivo

      const asesor = document.getElementById("asesor").value
      const estadoInicial = document.getElementById("estadoInicial").value
      const estadoAvanzado = document.getElementById("estadoAvanzado").value

      let estadoFinal = ""

      if (estadoInicial) estadoFinal = estadoInicial
      if (estadoAvanzado) estadoFinal = estadoAvanzado

      // ⭐ FORZAR COTIZADO SI YA ESTÁ EN MODO COTIZACIÓN
      if (estadoAvanzado == "COTIZADO") {
        estadoFinal = "COTIZADO"
      }

      const estadoActual = document.getElementById("estado").innerText

      // Solo exigir estado si NO está ya en COTIZADO
      if (
        !estadoFinal &&
        !estadoActual.includes("COTIZADO") &&
        !estadoActual.includes("CERRADO")
      ) {
        alert("Seleccione estado")
        return
      }

      const estadoPost = document.getElementById("estadoPostCot").value

      //Sección de CERRADO
      if (estadoPost == "CERRADO") {

        const numCot = document.getElementById("listaCotizaciones").value || document.getElementById("numCot").value
        if (!numCot || numCot === "") {
          alert("Seleccione cotización")
          document.querySelector(".btnGuardar").innerText = "Guardar Cambios"
          document.querySelector(".btnGuardar").disabled = false
          return
        }
        const numOV = document.getElementById("numOV").value
        const montoOV = document.getElementById("montoOV").value
        const monedaOV = document.getElementById("monedaOV").value

        if (!numCot || numCot === "NEW" || !numOV || !montoOV || !monedaOV) {
          alert("Complete datos de cierre")
          document.querySelector(".btnGuardar").innerText = "Guardar Cambios"
          document.querySelector(".btnGuardar").disabled = false
          return
        }

        const selOV = document.getElementById("listaOV").value

        const numOVFinal = selOV && selOV !== "NEW"
          ? selOV
          : document.getElementById("numOV").value


        fetch(URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "ov",
            id: id,
            asesor: asesor || null,
            numCot: numCot,
            monedaOV: monedaOV,
            numOV: numOVFinal,
            monto: montoOV,
          })
        })
          .then(r => r.json())
          .then(resp => {
            document.querySelector(".btnGuardar").innerText = "Guardar Cambios"
            document.querySelector(".btnGuardar").disabled = false
            if (resp.ok) {
              document.getElementById("msgOk").style.display = "block"
              setTimeout(() => {
                document.getElementById("estado").innerHTML = ""
                document.getElementById("listaCotizaciones").value = ""
                document.getElementById("estadoPostCot").value = ""
                document.getElementById("listaOV").innerHTML = ""
                document.getElementById("bloqueOV").style.display = "none"
                document.getElementById("numOV").value = ""
                document.getElementById("montoOV").value = ""
                document.getElementById("monedaOV").value = ""
                buscar()
              }, 1500)
            }
            console.log(resp)
          })

        return
      }


      //Sección de Cotizado
      if (estadoFinal == "COTIZADO" && estadoPost !== "CERRADO") {

        estadoFinal = "COTIZADO"

        const moneda = document.getElementById("monedaCot").value
        const monto = document.getElementById("montoCot").value
        const numCot = document.getElementById("numCot").value
        const selCot = document.getElementById("listaCotizaciones").value


        if (selCot === "NEW") {
          if (!moneda || !monto || !numCot) {
            alert("Complete datos cotización")
            return
          }
        }
        //-----Estado Cotizado------
        fetch(URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "cotizar",
            id: id,
            asesor: asesor || null,
            moneda: moneda,
            monto: monto,
            numCot: selCot && selCot !== "NEW"
              ? selCot
              : numCot
          })
        })
          .then(r => r.json())
          .then(resp => {

            if (resp.ok) {

              document.getElementById("bloqueCotizacion").style.display = "none"
              document.getElementById("bloqueGestionCot").style.display = "block"

              document.getElementById("msgOk").style.display = "block"

              // REFRESH SOLO SECCIÓN
              setTimeout(() => {
                document.getElementById("listaCotizaciones").value = ""
                buscar()
              }, 1500)
            }
          })

          .catch(() => {
            alert("Error al guardar cotización")
          })

        return
      }

      document.querySelector(".btnGuardar").innerText = "Guardando..."
      document.querySelector(".btnGuardar").disabled = true

      //----- Estado perdido

      const motivo = document.getElementById("motivoPerdido").value

      if (
        (estadoPost === "PERDIDO" || estadoAvanzado === "PERDIDO") &&
        (!motivo || motivo.trim() === "")
      ) {
        alert("Ingrese motivo de pérdida")
        return
      }

      if (estadoPost == "PERDIDO" || estadoAvanzado == "PERDIDO") {

        fetch(URL, {
          method: "POST",
          body: JSON.stringify({
            accion: "perdido",
            id: id,
            asesor: asesor || null,
            comentario: motivo
          })
        })
          .then(r => r.json())
          .then(resp => {
            if (resp.ok) {
              document.getElementById("msgOk").style.display = "block"
              setTimeout(() => buscar(), 1200)
            } else {
              alert(resp.msg || "No se pudo guardar")
            }
          })

        return
      }

      //----- Estado atendido

      fetch(URL, {
        method: "POST",
        body: JSON.stringify({
          accion: "atender",
          id: id,
          asesor: asesor || null,
          estado: estadoFinal
        })
      })
        .then(r => r.json())
        .then(resp => {
          if (resp && resp.ok) {
            document.getElementById("msgOk").style.display = "block"
            document.getElementById("bloqueCotizacion").style.display = "none"
            document.getElementById("bloqueGestionCot").style.display = "block"

            document.querySelector(".btnGuardar").innerText = "Guardar Cambios"
            document.querySelector(".btnGuardar").disabled = false
            // SI ES ATENDIDO → REFRESH APP
            if (estadoFinal == "ATENDIDO") {
              setTimeout(() => {
                nuevaBusqueda()
              }, 1200)
            }
          }
          else {
            alert("No se pudo guardar")
          }
        })
        .catch(() => {
          alert("Error conexión")
          document.querySelector(".btnGuardar").innerText = "Guardar Cambios"
          document.querySelector(".btnGuardar").disabled = false
        })

    }


    //Función boton para nueva busqueda

    function nuevaBusqueda() {

      leadActivo = null

      document.getElementById("idLead").readOnly = false
      document.getElementById("idLead").value = ""

      document.getElementById("btnBuscarLead").style.display = "block"
      document.getElementById("btnBuscarMini").style.display = "none"

      document.getElementById("zonaGestion").style.display = "none"
      document.getElementById("info").style.display = "none"
      document.getElementById("estado").innerHTML = ""
      document.getElementById("msgOk").style.display = "none"

    }

    //sección de Cotizado
    document.getElementById("estadoAvanzado")
      .addEventListener("change", function () {

        if (this.value == "COTIZADO") {

          document.getElementById("bloquePerdido").style.display = "none"

          document.getElementById("bloqueCotizacion").style.display = "block"
          document.getElementById("bloqueGestionCot").style.display = "block"

          const sel = document.getElementById("listaCotizaciones")
          sel.innerHTML = ""

          if (window.historialLead) {

            let op0 = document.createElement("option")
            op0.text = "N° de Cotización"
            op0.value = ""
            sel.add(op0)

            const cots = [...new Set(window.historialLead.map(x => x.numCot).filter(Boolean))]

            cots.forEach(c => {
              let op = document.createElement("option")
              op.text = c
              op.value = c
              sel.add(op)
            })

            let opNew = document.createElement("option")
            opNew.text = "Nueva Cotización"
            opNew.value = "NEW"
            sel.add(opNew)

          }

        } if (this.value == "PERDIDO") {

          document.getElementById("bloqueCotizacion").style.display = "none"
          document.getElementById("bloqueGestionCot").style.display = "none"

          document.getElementById("bloquePerdido").style.display = "block"

        } else if (this.value == "") {
          document.getElementById("bloqueCotizacion").style.display = "none"
          document.getElementById("bloqueGestionCot").style.display = "none"
          document.getElementById("bloquePerdido").style.display = "none"
        }

      })

    document.getElementById("montoCot")
      .addEventListener("blur", function () {

        let v = this.value.replace(",", ".")

        if (v && !isNaN(v)) {
          this.value = Number(v).toFixed(2)
        }

      })

    document.getElementById("montoOV")
      .addEventListener("blur", function () {

        let v = this.value.replace(",", ".")

        if (v && !isNaN(v)) {
          this.value = Number(v).toFixed(2)
        }

      })

    document.getElementById("listaCotizaciones").addEventListener("change", function () {

      const num = this.value

      // reset
      document.getElementById("estadoPostCot").style.display = "none"

      if (num == "NEW") {

        document.getElementById("bloqueCotizacion").style.display = "block"

        document.getElementById("monedaCot").value = ""
        document.getElementById("montoCot").value = ""
        document.getElementById("numCot").value = ""
        document.getElementById("numCot").readOnly = false

        // estado SIEMPRE al final
        document.getElementById("estadoPostCot").style.display = "block"

        return
      }

      if (num) {

        const cot = window.historialLead.find(x => String(x.numCot).trim() == String(num).trim())

        if (cot) {

          document.getElementById("bloqueCotizacion").style.display = "block"

          document.getElementById("monedaCot").value = cot.monedaCot || ""
          document.getElementById("montoCot").value = cot.montoCot || ""
          document.getElementById("numCot").value = cot.numCot || ""
          document.getElementById("numCot").readOnly = true

          // estado al final
          document.getElementById("estadoPostCot").style.display = "block"

          // ===== CARGAR OVS AUTOMÁTICAMENTE =====
          const selOV = document.getElementById("listaOV")
          selOV.innerHTML = ""

          const ovs = (window.dataOVs && window.dataOVs[num]) || []

          if (ovs.length > 0) {

            let op0 = document.createElement("option")
            op0.text = "N° de Orden de Venta"
            op0.value = ""
            selOV.add(op0)

            ovs.forEach(o => {
              let op = document.createElement("option")
              op.text = o
              op.value = o
              selOV.add(op)
            })

            let opNew = document.createElement("option")
            opNew.text = "Nueva Orden de Venta"
            opNew.value = "NEW"
            selOV.add(opNew)

            selOV.style.display = "block"

          } else {
            selOV.style.display = "none"
          }
          if (document.getElementById("estadoPostCot").value === "CERRADO") {
            document.getElementById("bloqueOV").style.display = "block"
          }
        }

      }

    })

    document.getElementById("estadoPostCot").addEventListener("change", function () {

      const estado = this.value

      if (this.value !== "PERDIDO") {
        document.getElementById("bloquePerdido").style.display = "none"
      }
      document.getElementById("bloqueOV").style.display = "none"
      if (this.value === "CERRADO") {
        document.getElementById("bloqueEstadoAvanzado").style.display = "none"
      }

      if (estado === "CERRADO") {

        document.getElementById("bloqueCotizacion").style.display = "none"
        document.getElementById("bloqueOV").style.display = "block"

      }

      if (estado === "PERDIDO") {

        document.getElementById("bloqueCotizacion").style.display = "none"
        document.getElementById("bloqueOV").style.display = "none"
        document.getElementById("bloquePerdido").style.display = "block"

      }

      if (estado === "COTIZADO") {

        document.getElementById("estadoPostCot").style.display = "none"

        document.getElementById("bloqueGestionCot").style.display = "block"
        document.getElementById("bloqueCotizacion").style.display = "block"
        document.getElementById("bloqueOV").style.display = "none"
        document.getElementById("bloquePerdido").style.display = "none"

      }

    })

    document.getElementById("listaOV").addEventListener("change", function () {

      const numOV = this.value

      if (!numOV || numOV == "NEW") {

        document.getElementById("monedaOV").value = ""
        document.getElementById("montoOV").value = ""
        document.getElementById("numOV").value = ""
        document.getElementById("numOV").readOnly = false
        return

      }

      const ov = window.historialLead.find(x =>
        String(x.numOV).trim() === String(numOV).trim()
      )

      if (ov) {

        document.getElementById("monedaOV").value = ov.monedaOV || ""
        document.getElementById("montoOV").value = ov.montoOV || ""
        document.getElementById("numOV").value = ov.numOV || ""
        document.getElementById("numOV").readOnly = true

      }

    })

  </script>

</body>

</html>
