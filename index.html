<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM Ciptech</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html,body{
margin:0;
padding:0;
height:100%;
background:#e9ecef;
}
.campo{
margin-top:14px;
}

select{
width:100%;
padding:14px;
border-radius:14px;
border:2px solid #3b3b3b;
font-size:15px;
background:white;
}

/* APP CONTAINER */

.app{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */

.card{
background:white;
width:100%;
max-width:420px;
border-radius:18px;
padding:28px 22px 32px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

/* TITULOS */

.t1{
color:#7ED957;
font-size:22px;
font-weight:bold;
margin-bottom:2px;
}

.t2{
color:#123E7A;
font-size:22px;
font-weight:bold;
margin-bottom:22px;
}

/* INPUT */

input{
width:100%;
padding:15px;
border-radius:14px;
border:2px solid #444;
font-size:17px;
margin-bottom:18px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#1f4a83;
color:white;
font-size:17px;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.97);
}

#zonaGestion button{
margin-top:22px;
}

/* LOADER */

.loader{
display:none;
margin:18px 0;
}

.spinner{
width:28px;
height:28px;
border:4px solid #ddd;
border-top:4px solid #1f4a83;
border-radius:50%;
animation:spin .8s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* INFO */

.box{
background:#dfe6ef;
padding:16px;
border-radius:12px;
font-weight:bold;
color:#123E7A;
margin-top:18px;
display:none;
}

.estado{
margin-top:18px;
font-size:17px;
}

.msgOk{
background:#6fd14b;
color:white;
padding:14px;
margin-top:15px;
border-radius:12px;
text-align:center;
font-weight:600;
}

/* MOBILE FULL APP */

@media(max-width:480px){

.app{
align-items:flex-start;
padding:14px;
}

.card{
max-width:100%;
min-height:100vh;
border-radius:0;
box-shadow:none;
padding-top:40px;
}

}

</style>

</head>

<body>

<div class="app">

<div class="card">

<div class="t1">Atención Leads</div>
<div class="t2">MKT Ciptech</div>
  
<!-- COLOCAR ID DEL LEAD -->
<input id="idLead" placeholder="ID Lead">

<!-- BOTON DE BUSCAR LEAD -->
<button onclick="buscar()">Buscar lead</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div id="info" class="box"></div>
<div id="estado" class="estado"></div>

<!-- DESPLEGABLES -->
<div id="zonaGestion" style="display:none">

<div class="boxInfo" id="infoLead"></div>

<div class="estado">
Estado Actual: <b id="estadoTxt"></b>
</div>

<div id="bloqueAsesor" class="campo">
<select id="asesor">
<option value="">Seleccionar Asesor</option>
<option>Herson Zevallos</option>
<option>Luz Arone</option>
<option>Daniel Bravo</option>
<option>Brayan Martinez</option>
</select>
</div>

<div id="bloqueEstadoInicial" class="campo">
<select id="estadoInicial">
<option value="">Seleccionar Estado</option>
<option>ATENDIDO</option>
</select>
</div>

<div id="bloqueEstadoAvanzado" class="campo">
<select id="estadoAvanzado">
<option>COTIZADO</option>
<option>CERRADO</option>
<option>PERDIDO</option>
</select>
</div>

<button class="btnGuardar" onclick="guardar()">Guardar Cambios</button>
<div id="msgOk" class="msgOk" style="display:none">
Se guardó con éxito
</div>
  
</div>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzSc0ncg1rGKUxalwXtaQJ3qMEB0sSBd5lhLs2pUVUcocNYWbd6CkW6HHmtQ4KRQ_dvLw/exec";

//FUNCIÓN DE CONSULTA DE LEADS
function buscar(){

const id = document.getElementById("idLead").value.trim()

if(!id){
alert("Ingrese ID")
return
}

document.getElementById("loader").style.display="block"

fetch(URL + "?accion=consultar&id=" + id)

.then(r=>r.json())

.then(data=>{

document.getElementById("loader").style.display="none"

if(!data || !data.lead){
alert("Lead no encontrado")
return
}

document.getElementById("info").style.display="block"
document.getElementById("info").innerHTML =
"Empresa: " + data.lead.empresa +
"<br>RUC: " + data.lead.ruc +
"<br>Teléfono: " + data.lead.telefono

document.getElementById("estado").innerHTML =
"Estado Actual: <b>" + data.estado + "</b>"
pintarLead(data)
})

if(estadoInicial=="ATENDIDO" && !asesor){
alert("Seleccione asesor")
return
}
  
.catch(err=>{
document.getElementById("loader").style.display="none"
alert("Error conexión")
})

}

//FUNCIÓN PARA MOSTRAR LOS ESTADOS DEL LEAD
  
function pintarLead(data){

document.getElementById("zonaGestion").style.display="block"

const estado = data.estado

document.getElementById("bloqueAsesor").style.display="none"
document.getElementById("bloqueEstadoInicial").style.display="none"
document.getElementById("bloqueEstadoAvanzado").style.display="none"

if(estado=="SIN GESTIONAR"){
document.getElementById("bloqueAsesor").style.display="block"
document.getElementById("bloqueEstadoInicial").style.display="block"
}

if(estado=="ATENDIDO"){
document.getElementById("bloqueEstadoAvanzado").style.display="block"
}

}

//GUARDAR CAMBIOS
function guardar(){

const id = document.getElementById("idLead").value.trim()

const asesor = document.getElementById("asesor").value
const estadoInicial = document.getElementById("estadoInicial").value
const estadoAvanzado = document.getElementById("estadoAvanzado").value

let estadoFinal = ""

if(estadoInicial) estadoFinal = estadoInicial
if(estadoAvanzado) estadoFinal = estadoAvanzado

if(!estadoFinal){
alert("Seleccione estado")
return
}

fetch(URL,{
method:"POST",
body:JSON.stringify({
accion:"atender",
id:id,
asesor:asesor
})
})
.then(r=>r.json())
.then(resp=>{
if(resp.ok){
document.getElementById("msgOk").style.display="block"
}else{
alert("No se pudo guardar")
}
})
.catch(()=>{
alert("Error conexión")
})

}

</script>

</body>
</html>
