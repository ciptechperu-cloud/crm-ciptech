<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>CRM Ciptech</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html,body{
margin:0;
padding:0;
height:100%;
background:#e9ecef;
}

/* APP CONTAINER */

.app{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */

.card{
background:white;
width:100%;
max-width:420px;
border-radius:18px;
padding:28px 22px 32px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

/* TITULOS */

.t1{
color:#7ED957;
font-size:22px;
font-weight:bold;
margin-bottom:2px;
}

.t2{
color:#123E7A;
font-size:22px;
font-weight:bold;
margin-bottom:22px;
}

/* INPUT */

input{
width:100%;
padding:15px;
border-radius:14px;
border:2px solid #444;
font-size:17px;
margin-bottom:18px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#1f4a83;
color:white;
font-size:17px;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.97);
}

/* LOADER */

.loader{
display:none;
margin:18px 0;
}

.spinner{
width:28px;
height:28px;
border:4px solid #ddd;
border-top:4px solid #1f4a83;
border-radius:50%;
animation:spin .8s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* INFO */

.box{
background:#dfe6ef;
padding:16px;
border-radius:12px;
font-weight:bold;
color:#123E7A;
margin-top:18px;
display:none;
}

.estado{
margin-top:18px;
font-size:17px;
}

/* MOBILE FULL APP */

@media(max-width:480px){

.app{
align-items:flex-start;
padding:14px;
}

.card{
max-width:100%;
min-height:100vh;
border-radius:0;
box-shadow:none;
padding-top:40px;
}

}

</style>

</head>

<body>

<div class="app">

<div class="card">

<div class="t1">Atención Leads</div>
<div class="t2">MKT Ciptech</div>

<input id="idLead" placeholder="ID Lead">

<button onclick="buscar()">Buscar lead</button>

<div class="loader" id="loader">
<div class="spinner"></div>
</div>

<div id="info" class="box"></div>
<div id="estado" class="estado"></div>

</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzSc0ncg1rGKUxalwXtaQJ3qMEB0sSBd5lhLs2pUVUcocNYWbd6CkW6HHmtQ4KRQ_dvLw/exec";

function buscar(){

const id = document.getElementById("id").value.trim()

if(!id){
alert("Ingrese ID")
return
}

loader.style.display="block"

fetch(API_URL + "?accion=consultar&id=" + id)

.then(r=>r.json())

.then(data=>{

loader.style.display="none"

if(!data || !data.lead){
alert("Lead no encontrado")

loader.style.display="none"
alert("Error conexión")
})

}

</script>

</body>
</html>
